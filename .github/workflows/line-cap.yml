# Line-cap gate (ported from trusty-tools' issue #610, adapted to *.cs).
#
# Enforces the 500-line file-size cap mechanically via a ratcheted allowlist:
#   - a NEW tracked .cs file over 500 lines fails the job (cannot merge);
#   - an allowlisted (grandfathered) file may not grow past its frozen budget;
#   - when an allowlisted file drops to <= 500 lines its entry must be removed.
#
# Pure line counting — no .NET toolchain or build needed, so this is fast and
# runs as its own lightweight job.
name: Line cap

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: line-cap-${{ github.ref }}
  cancel-in-progress: true

jobs:
  line-cap:
    name: 500-line file-size cap
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Enforce 500-line file cap (ratcheted allowlist)
        run: bash scripts/check_line_cap.sh
